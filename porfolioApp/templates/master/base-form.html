{% extends "master/base.html" %}
{% load crispy_forms_tags %}

{% block body %}
<h1>{{form_name}}</h1>
<form method="POST" enctype="multipart/form-data">
    {% csrf_token %}

    {{ form_data|crispy }}
  
  <button type="submit" class="btn btn-primary">{{form_btn}}</button>
</form>

{% endblock body %}
